<style>
body { background:#0d1117; color:#e6edf3; font-family:Arial; }
.container { max-width:1400px; margin:auto; padding:20px; }

.card { 
  background:#161b22; 
  border:1px solid #30363d; 
  border-radius:10px; 
  padding:15px; 
  overflow:auto;
  max-height:600px;
}

table { 
  width:100%; 
  border-collapse:separate;
  border-spacing:0;
  min-width:1000px;
  font-size:12px;
}

thead th {
  position:sticky;
  top:0;
  background:#1c2330;
  z-index:10;
}

thead th:first-child,
tbody td:first-child {
  position:sticky;
  left:0;
  background:#1c2330;
  z-index:11;
}

th, td {
  padding:8px;
  border-bottom:1px solid #30363d;
  border-right:1px solid #30363d;
}

.name { text-align:left; font-weight:bold; }

.up { color:#f85149; }
.dn { color:#3fb950; }

.kd-bar { width:80px; height:6px; background:#222; border-radius:3px; margin:auto; position:relative; }
.kd-dot { width:8px; height:8px; border-radius:50%; position:absolute; top:-1px; transform:translateX(-50%); }

.bb-bar { width:80px; height:6px; background:#222; border-radius:3px; margin:auto; position:relative; }
.bb-dot { width:6px; height:10px; position:absolute; top:-2px; transform:translateX(-50%); }

.summary { display:flex; gap:10px; margin-bottom:10px; }
.box { flex:1; padding:10px; border-radius:8px; text-align:center; }
.buy { background:#3fb95022; }
.sell { background:#f8514922; }
.watch { background:#d2992222; }
.hold { background:#8b949e22; }
</style>
</head>

<tbody id="stockBody"></tbody>
</table>
</div>

<script>
function kdColor(k){
  if(k > 70) return "#f85149";
  if(k < 30) return "#3fb950";
  return "#d29922";
}

function bbPosition(bb){
  if(!bb) return 50;
  if(bb.includes("上")) return 80;
  if(bb.includes("下")) return 20;
  return 50;
}

function renderRow(s){

  const chgClass = s.chgPct >= 0 ? "up":"dn";
  const chgSign = s.chgPct >= 0 ? "+" : "";

  return `
  <tr>
    <td class="name">${s.name}</td>
    <td>${s.code}</td>
    <td>${s.price ?? "-"}</td>

    <td class="${chgClass}">
      ${chgSign}${s.chgPct ?? 0}%
    </td>

    <td>${s.amp ?? "-"}%</td>

    <td>${s.gross_margin ?? "-"}%</td>
    <td>${s.net_margin ?? "-"}%</td>

    <td>${s.ttm_eps ?? "-"}</td>
    <td>${s.est_eps ?? "-"}</td>

    <td>
      ${s.k ?? "-"}
      <div class="kd-bar">
        <div class="kd-dot"
          style="left:${s.k ?? 50}%; background:${kdColor(s.k ?? 50)}">
        </div>
      </div>
    </td>

    <td>
      ${s.bb ?? "-"}
      <div class="bb-bar">
        <div class="bb-dot"
          style="left:${bbPosition(s.bb)}%; background:#58a6ff">
        </div>
      </div>
    </td>

    <td>${s.strategy ?? "-"}</td>
  </tr>
  `;
}

document.getElementById("stockBody").innerHTML =
  stocks.map(renderRow).join("");


// ===== 統計（改用 strategy）=====
const rebound = stocks.filter(s => s.strategy?.includes("反彈")).length;
const sell = stocks.filter(s => s.strategy?.includes("出貨")).length;
const watch = stocks.filter(s => s.strategy === "觀察").length;
const hold = stocks.filter(s => s.strategy === "整理").length;

document.getElementById("buyCount").innerText = rebound;
document.getElementById("sellCount").innerText = sell;
document.getElementById("watchCount").innerText = watch;
document.getElementById("holdCount").innerText = hold;
</script>
