<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>(жҢҒиӮЎ)еҸ°иӮЎжҠҖиЎ“еҲҶжһҗе ұе‘Ҡ</title>

<style>
body { background:#0d1117; color:#e6edf3; font-family:Arial; }
.container { max-width:1400px; margin:auto; padding:20px; }

.card { 
  background:#161b22; 
  border:1px solid #30363d; 
  border-radius:10px; 
  padding:15px; 
  overflow:auto;
  max-height:600px;
}

table { 
  width:100%; 
  border-collapse:separate;
  border-spacing:0;
  min-width:1000px;
  font-size:12px;
}

thead th {
  position:sticky;
  top:0;
  background:#1c2330;
  z-index:10;
}

thead th:first-child,
tbody td:first-child {
  position:sticky;
  left:0;
  background:#1c2330;
  z-index:11;
}

th, td {
  padding:8px;
  border-bottom:1px solid #30363d;
  border-right:1px solid #30363d;
}

.name { text-align:left; font-weight:bold; }

.up { color:#f85149; }
.dn { color:#3fb950; }

.kd-bar { width:80px; height:6px; background:#222; border-radius:3px; margin:auto; position:relative; }
.kd-dot { width:8px; height:8px; border-radius:50%; position:absolute; top:-1px; transform:translateX(-50%); }

.bb-bar { width:80px; height:6px; background:#222; border-radius:3px; margin:auto; position:relative; }
.bb-dot { width:6px; height:10px; position:absolute; top:-2px; transform:translateX(-50%); }

.sig { padding:2px 6px; border-radius:4px; font-size:11px; }
.sig.up { background:#3fb95022; color:#3fb950; }
.sig.dn { background:#f8514922; color:#f85149; }
.sig.watch { background:#d2992222; color:#d29922; }

.summary { display:flex; gap:10px; margin-bottom:10px; }
.box { flex:1; padding:10px; border-radius:8px; text-align:center; }
.buy { background:#3fb95022; }
.sell { background:#f8514922; }
.watch { background:#d2992222; }
.hold { background:#8b949e22; }

.metric {
  text-align: center;
  line-height: 1.2;
}

.metric .main {
  font-size: 16px;
  font-weight: bold;
}

.metric .sub {
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  margin-top: 2px;
}

.text-red {
  color: #ff4d4f;
}

.text-green {
  color: #00b050;
}

</style>
</head>

<body>

<div class="container">

<h2>(жҢҒиӮЎ)еҸ°иӮЎжҠҖиЎ“еҲҶжһҗе ұе‘Ҡ</h2>

<div class="summary">
  <div class="box buy"><b id="buyCount"></b><br>еҸҚеҪҲ</div>
  <div class="box sell"><b id="sellCount"></b><br>еҮәиІЁ</div>
  <div class="box watch"><b id="watchCount"></b><br>и§ҖеҜҹ</div>
  <div class="box hold"><b id="holdCount"></b><br>ж•ҙзҗҶ</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>еҗҚзЁұ</th>
<th>д»Јзўј</th>
<th>еғ№ж ј</th>
<th>жјІи·Ң</th>
<th>жјІи·Ң%</th>
<th>йңҮе№…%</th>
<th>еҺ»е№ҙEPS</th>
<th>дј°EPS</th>
<th>
  <div>жҜӣеҲ©зҺҮ%</div>
  <div>QoQ YoY</div>
</th>
<th>
  <div>зҮҹзӣҠзҺҮ%</div>
  <div>QoQ YoY</div>
</th>
<th>
  <div>ж·ЁеҲ©зҺҮ%</div>
  <div>QoQ YoY</div>
</th>
<th>ж®–еҲ©зҺҮ</th>
<th>жң¬зӣҠжҜ”</th>
<th>KD</th>
<th>еёғжһ—</th>
<th>Bias6</th>
<th>Bias18</th>
<th>Bias50</th>
<th>иЁҠиҷҹ</th>
<th>зӯ–з•Ҙ</th>
</tr>
</thead>
<tbody id="stockBody"></tbody>
</table>
</div>

</div>

<script>
const stocks = {{ stocks | tojson }};

function renderMetric(value, qoq, yoy) {
  const fmt = (v) => (v === null || v === undefined ? "-" : v);

  const arrow = (v) => {
    if (v === null || v === undefined) return "";
    return v > 0 ? "вҶ‘" : v < 0 ? "вҶ“" : "";
  };

  const colorClass = (v) => {
    if (v === null || v === undefined) return "";
    return v > 0 ? "text-red" : v < 0 ? "text-green" : "";
  };

  return `
    <div class="metric">
      <div class="main">${fmt(value)}</div>
      <div class="sub">
        <span class="${colorClass(qoq)}">${arrow(qoq)}${fmt(qoq)}</span>
        <span class="${colorClass(yoy)}">${arrow(yoy)}${fmt(yoy)}</span>
      </div>
    </div>
  `;
}

function distClass(val) {
  if (!val) return "";
  return val > 0 ? "up" : "dn";
}

function kdColor(k){
  if(k > 75) return "#f85149";
  if(k < 25) return "#3fb950";
  return "#d29922";
}

function bbPosition(bb){
  if(!bb) return 50;
  if(bb.includes("дёҠ")) return 80;
  if(bb.includes("дёӢ")) return 20;
  return 50;
}

function renderRow(s){
  const chgClass = s.chgPct >= 0 ? "up":"dn";
  const chgSign = s.chgPct >= 0 ? "+" : "";
  const sigClass = { 1: "up", 0: "watch", "-1": "dn" };
  const sigLabel = { 1: "иІ·е…Ҙ", 0: "и§Җжңӣ", "-1": "иіЈеҮә" };

  return `
  <tr>
    <td class="name">${s.name}</td>
    <td>${s.code}</td>
    <td>${s.price}</td>
    <td class="${chgClass}">${chgSign}${s.chg}</td>
    <td class="${chgClass}">${chgSign}${s.chgPct}%</td>
    <td>${s.amp ?? 0}%</td>
    <td>${s.eps_Y ?? "-"}</td>

    <td>
      <small>TTM:</small> ${s.eps_ttm ?? "-"} <br>
      <small>й җдј°:</small> ${s.eps_est ?? "-"}
    </td>

    <td>
      ${renderMetric(
        s.gross_margin,
        s.gross_margin_qoq,
        s.gross_margin_yoy_diff
      )}
    </td>

    <td>
      ${renderMetric(
        s.operating_margin,
        s.operating_margin_qoq,
        s.operating_margin_yoy_diff
      )}
    </td>

    <td>
      ${renderMetric(
        s.net_margin,
        s.net_margin_qoq,
        s.net_margin_yoy_diff
      )}
    </td>

    <td>${s.yield?.yield ?? "-"}%</td>

    <td>
      <small>TTM:</small> ${s.per_ttm ?? "-"} <br>
      <small>й җдј°:</small> ${s.per_est ?? "-"}
    </td>

    <td>
      ${s.k}/${s.d}
      <div class="kd-bar">
        <div class="kd-dot" style="left:${s.k}%; background:${kdColor(s.k)}"></div>
      </div>
    </td>

    <td>
      ${s.bb_pct ?? "-"}%
      <div class="bb-bar">
        <div class="bb-dot"
         style="left:${s.bb_pct ?? 50}%; background:#58a6ff">
        </div>
      </div>
    </td>

    <td class="${distClass(s.bias6)}">${s.bias6 ?? ""}%</td>
    <td class="${distClass(s.bias18)}">${s.bias18 ?? ""}%</td>
    <td class="${distClass(s.bias50)}">${s.bias50 ?? ""}%</td>
    <td> <span class="sig ${sigClass[s.sig]}">${sigLabel[s.sig]}</span></td>
    <td>${s.strategy}</td>
  </tr>`;
}

// вң… зөұиЁҲпјҲж”ҫеӨ–йқўпјү
const rebound = stocks.filter(s => s.strategy?.includes("еҸҚеҪҲ")).length;
const sell = stocks.filter(s => s.strategy?.includes("еҮәиІЁ")).length;
const watch = stocks.filter(s => s.strategy === "и§ҖеҜҹ").length;
const hold = stocks.filter(s => s.strategy === "ж•ҙзҗҶ").length;

// render
document.getElementById("stockBody").innerHTML =
  stocks.map(renderRow).join("");

// summary
document.getElementById("buyCount").innerText = rebound;
document.getElementById("sellCount").innerText = sell;
document.getElementById("watchCount").innerText = watch;
document.getElementById("holdCount").innerText = hold;
</script>

</body>
</html>
